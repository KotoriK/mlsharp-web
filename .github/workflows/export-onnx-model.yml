name: Export ONNX Model

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if model exists'
        required: false
        default: 'false'
        type: boolean

# Restrict the workflow to only modify the public/models directory
permissions:
  contents: write

jobs:
  export-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history to push changes
          fetch-depth: 0

      - name: Check if model already exists
        id: check-model
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "Force rebuild requested"
            echo "skip=false" >> $GITHUB_OUTPUT
          elif gh release view model-release --json assets --jq '.assets[].name' 2>/dev/null | grep -q "sharp_model.onnx"; then
            echo "Model already exists in GitHub Release and force_rebuild is not set"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check-model.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyTorch and dependencies
        if: steps.check-model.outputs.skip != 'true'
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install onnx onnxruntime onnxsim onnxscript timm pillow-heif scipy click imageio matplotlib plyfile

      - name: Clone ml-sharp repository
        if: steps.check-model.outputs.skip != 'true'
        run: |
          git clone https://github.com/apple/ml-sharp.git /tmp/ml-sharp
          pip install -e /tmp/ml-sharp

      - name: Export model to ONNX
        if: steps.check-model.outputs.skip != 'true'
        run: |
          # Create output directory
          mkdir -p public/models
          
          # Run export script (downloads checkpoint automatically)
          python scripts/export_to_onnx.py \
            -o public/models/sharp_model.onnx \
            --verify

      - name: Verify model file
        if: steps.check-model.outputs.skip != 'true'
        run: |
          if [ ! -f "public/models/sharp_model.onnx" ]; then
            echo "Error: ONNX model was not created"
            exit 1
          fi
          
          # Print all model files (includes external data if model > 2GB)
          ls -lh public/models/sharp_model.onnx*
          
          # Get total size of all model files
          TOTAL_SIZE=0
          for f in public/models/sharp_model.onnx*; do
            SIZE=$(stat -c%s "$f")
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
          done
          echo "Total model size: $TOTAL_SIZE bytes"
          
          # Fail if model is suspiciously small (less than 1MB)
          if [ "$TOTAL_SIZE" -lt 1000000 ]; then
            echo "Error: Model file is too small, something went wrong"
            exit 1
          fi

      - name: Upload model to GitHub Release
        if: steps.check-model.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="model-release"

          # Create the release if it doesn't exist yet
          if ! gh release view "$RELEASE_TAG" &>/dev/null; then
            gh release create "$RELEASE_TAG" \
              --title "ML-SHARP ONNX Model" \
              --notes "Automatically exported ONNX model files. The web application downloads these files at runtime for in-browser inference." \
              --latest
          fi

          # Upload model files with retry logic (--clobber replaces existing assets)
          UPLOAD_SUCCESS=false
          for attempt in 1 2 3; do
            echo "Upload attempt $attempt..."
            UPLOAD_OK=true

            if ! gh release upload "$RELEASE_TAG" \
              public/models/sharp_model.onnx \
              --clobber; then
              UPLOAD_OK=false
            fi

            if [ "$UPLOAD_OK" = "true" ] && [ -f "public/models/sharp_model.onnx.data" ]; then
              if ! gh release upload "$RELEASE_TAG" \
                public/models/sharp_model.onnx.data \
                --clobber; then
                UPLOAD_OK=false
              fi
            fi

            if [ "$UPLOAD_OK" = "true" ]; then
              echo "Upload succeeded on attempt $attempt"
              UPLOAD_SUCCESS=true
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in 15 seconds..."
              sleep 15
            fi
          done

          if [ "$UPLOAD_SUCCESS" = "false" ]; then
            echo "::warning::All GitHub Release upload attempts failed. Model will be available as workflow artifact only."
          fi

      - name: Upload model as artifact
        if: steps.check-model.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sharp-model-onnx
          path: public/models/
          retention-days: 90
